name: Pruebas de Humo API

on:
  push:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Newman
        run: npm install -g newman

      - name: Ejecutar pruebas de humo
        run: newman run pruebas_humo_api.json

      - name: Ejecutar pruebas con reporte
        run: npm install -g newman-reporter-html
            newman run pruebas_humo_api.json -r html --reporter-html-export reporte.html
      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Pruebas-Humo
          path: reporte.html